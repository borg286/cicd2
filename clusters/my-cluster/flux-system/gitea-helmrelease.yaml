apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 1h
  url: oci://code.forgejo.org/forgejo-helm
  type: oci
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 5m
  chart:
    spec:
      chart: forgejo
      version: "17.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  values:
    gitea:
      config:
        server:
          ROOT_URL: "http://forgejo-http.forgejo:3000"
        actions:
          ENABLED: true
      admin:
        username: admin
