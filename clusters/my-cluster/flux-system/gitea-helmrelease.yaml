apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 1h
  url: https://codeberg.org/forgejo/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 5m
  chart:
    spec:
      chart: forgejo
      version: "17.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  values:
    # The chart by default looks for secret 'forgejo-admin' in the same namespace.
    # We created it manually as a prerequisite.
