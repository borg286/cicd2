apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cockroach-cluster
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/my-cluster/apps/cockroachdb-cluster
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
  dependsOn:
    - name: cockroach-operator
