apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cockroach-operator
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/my-cluster/apps/cockroach-operator
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
  dependsOn:
    - name: flux-system
