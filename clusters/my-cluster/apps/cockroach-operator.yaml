apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cockroach-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cockroach-operator
      version: ">=6.0.0"
      sourceRef:
        kind: HelmRepository
        name: cockroachdb
        namespace: flux-system
  install:
    createNamespace: true
