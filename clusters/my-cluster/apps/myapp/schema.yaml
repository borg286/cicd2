apiVersion: db.atlasgo.io/v1alpha1
kind: AtlasSchema
metadata:
  name: myapp-schema
  namespace: cockroachdb-system
spec:
  urlFrom:
    secretKeyRef:
      name: atlas-db-credentials
      key: url
  devdb:
    schema:
      sql: "CREATE SCHEMA IF NOT EXISTS atlas_dev;"
    engine: postgres 
  schema:
    sql: |
      CREATE TABLE users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email STRING UNIQUE NOT NULL,
        created_at TIMESTAMP DEFAULT now()
      );
