apiVersion: infra.contrib.fluxcd.io/v1alpha1
kind: Terraform
metadata:
  name: users-resources
  namespace: flux-system
spec:
  interval: 5m
  approvePlan: "auto"
  path: ./users/terraform
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  varsFrom:
    - kind: Secret
      name: gitea-admin
    - kind: Secret
      name: gitea-flux-password
    - kind: Secret
      name: user-passwords
