apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazel-runner
  namespace: flux-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bazel-runner
  template:
    metadata:
      labels:
        app: bazel-runner
    spec:
      serviceAccountName: gitea-runner-admin
      hostAliases:
      - ip: "10.43.173.111"
        hostnames:
        - "git.example.com"
      containers:
      - name: bazel-runtime
        image: pizzafactory0contorno/bazelisk:ubuntu-22.04
        env:
        - name: FORGEJO_URL
          value: "http://forgejo-http.forgejo:3000"
        - name: GITEA_RUNNER_REGISTRATION_TOKEN
          valueFrom:
            secretKeyRef:
              name: forgejo-admin-token
              key: RUNNER_REGISTRATION_TOKEN
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
            ephemeral-storage: 10Gi
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Copying act_runner from the image to a shared path if needed, 
            # but here we assume we might need it for persistence or unregistration.
            # However, let's see if we can just use it directly from a known location.
            # For now, I'll keep the 'cp' logic but simplified into the main container 
            # or just assume it's in the PATH if the image has it.
            # The user's suggestion used 'act_runner' directly.
            
            act_runner register \
              --instance "$FORGEJO_URL" \
              --token "$GITEA_RUNNER_REGISTRATION_TOKEN" \
              --name "$(hostname)" \
              --labels "bazel-heavy:host,k8s-admin:host" \
              --no-interactive;
            act_runner daemon
        lifecycle:
          preStop:
            exec:
              command: ["act_runner", "unregister"]
        volumeMounts:
        - name: work-dir
          mountPath: /data
      volumes:
      - name: work-dir
        emptyDir: {}
