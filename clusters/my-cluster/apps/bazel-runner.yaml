apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazel-runner
  namespace: forgejo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bazel-runner
  template:
    metadata:
      labels:
        app: bazel-runner
    spec:
      serviceAccountName: gitea-runner-admin
      hostAliases:
      - ip: "10.43.173.111"
        hostnames:
        - "git.example.com"
      initContainers:
      - name: install-runner
        image: gitea/act_runner:latest
        command: ["cp", "/usr/local/bin/act_runner", "/shared/act_runner"]
        volumeMounts:
        - name: shared-vol
          mountPath: /shared
      - name: register-jit
        image: alpine:latest
        env:
        - name: FORGEJO_URL
          value: "http://forgejo-http.forgejo:3000"
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: forgejo-admin-token
              key: token
        command: ["/bin/sh", "-c"]
        args:
          - |
            TOKEN=$(wget -qO- --header="Authorization: token $ADMIN_TOKEN" \
              $FORGEJO_URL/api/v1/admin/runners/registration-token | sed 's/.*"token":"\([^"]*\)".*/\1/' | tr -d '\r\n')
            
            echo "registration_token: $TOKEN" > /shared/registration.txt
        volumeMounts:
        - name: shared-vol
          mountPath: /shared
      containers:
      - name: bazel-runtime
        image: pizzafactory0contorno/bazelisk:ubuntu-22.04
        env:
        - name: FORGEJO_URL
          value: "http://forgejo-http.forgejo:3000"
        command: ["/bin/sh", "-c"]
        args:
          - |
            REG_TOKEN=$(cat /shared/registration.txt | cut -d' ' -f2)
            if [ -z "$REG_TOKEN" ]; then
              echo "Error: Registration token is empty"
              exit 1
            fi
            /shared/act_runner register \
              --instance $FORGEJO_URL \
              --token "$REG_TOKEN" \
              --name "$(hostname)" \
              --labels "bazel-heavy:host,k8s-admin:host" \
              --no-interactive;
            /shared/act_runner daemon
        lifecycle:
          preStop:
            exec:
              command: ["/shared/act_runner", "unregister"]
        volumeMounts:
        - name: shared-vol
          mountPath: /shared
        - name: work-dir
          mountPath: /data
      volumes:
      - name: shared-vol
        emptyDir: {}
      - name: work-dir
        emptyDir: {}
