apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: helloworld-chart
  namespace: flux-system
spec:
  # Note: Flux tracks the OCI repository, not the Helm index
  image: zot-registry.zot-system.svc.cluster.local:5000/charts/helloworld-chart
  interval: 1m
  insecure: true
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: helloworld-latest
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: helloworld-chart
  policy:
    numerical:
      order: asc # Picks the highest Unix timestamp
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: zot-charts
  namespace: flux-system
spec:
  interval: 1h
  type: oci
  url: oci://zot-registry.zot-system.svc.cluster.local:5000/charts
  insecure: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: helloworld
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: helloworld-chart
      # Flux replaces 'latest' with the actual digest (e.g., sha256:abcd...)
      # The setter below tells Flux to use the 'digest' property from the policy
      version: "latest" # {"$imagepolicy": "flux-system:helloworld-latest:digest"}
      sourceRef:
        kind: HelmRepository
        name: zot-charts
        namespace: flux-system
      interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: helloworld-updates
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system # Points to your Gitea manifest repo
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcd@internal.local
        name: Flux Automation
      messageTemplate: "chore: update go/examples/helloworld chart to {{ .SelectedTarget }}"
  update:
    path: ./clusters/my-cluster/apps/internal-charts/go-helloworld # Path to your HelmRelease manifest
    strategy: Setters