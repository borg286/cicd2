apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: emberstack
  namespace: flux-system
spec:
  interval: 24h
  url: https://emberstack.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: reflector
      version: "7.0.199"
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    # Standard settings for a small cluster
    replicaCount: 1
