apiVersion: v1
kind: Namespace
metadata:
  name: borg286
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-server-sa
  namespace: borg286
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: code-server-admin-binding
subjects:
  - kind: ServiceAccount
    name: code-server-sa
    namespace: borg286
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: code-server-svc
  namespace: borg286
spec:
  type: LoadBalancer
  ports:
    - name: code-server
      port: 8443
      targetPort: 8443
    - name: dev-web
      port: 8080
      targetPort: 8080
  selector:
    app: code-server
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: code-server
  namespace: borg286
spec:
  serviceName: "code-server-svc"
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      serviceAccountName: code-server-sa
      initContainers:
        - name: init-tools
          image: alpine:latest
          env:
            - name: K9S_VERSION
              value: "v0.32.4"
            - name: BAZELISK_VERSION
              value: "v1.19.0"
            - name: GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: token
          command:
            - "/bin/sh"
            - "-c"
            - |
              set -e
              apk add --no-cache curl tar git

              # 1. Persistent Binaries
              cd /usr/local/bin
              [ -f "kubectl" ] || curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              
              if [ ! -f "k9s" ]; then
                curl -LO "https://github.com/derailed/k9s/releases/download/${K9S_VERSION}/k9s_Linux_amd64.tar.gz"
                tar -xzf k9s_Linux_amd64.tar.gz k9s && rm k9s_Linux_amd64.tar.gz
              fi

              if [ ! -f "bazelisk" ]; then
                curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64"
                mv bazelisk-linux-amd64 bazelisk && ln -sf bazelisk bazel
              fi
              chmod +x kubectl k9s bazelisk

              # 2. Workspace & Git Setup
              mkdir -p /config/workspace/project
              if [ ! -d "/config/workspace/project/.git" ]; then
                # Use a temporary global config for the clone
                git clone -o origin http://${GITEA_TOKEN}@forgejo-http.forgejo:3000/main-org/main-repo.git /config/workspace/project
                cd /config/workspace/project
                git config user.name "Brian Matthews"
                git config user.email "borg286@gmail.com"
              fi
              chown -R 1000:1000 /config
              chown -R 1000:1000 /usr/local/bin

              # 3. Queue Extensions for main container
              echo "terencecarrera.gitea" > /config/extensions_to_install.txt
              echo "tarkil.gitea-actions-vscode-plugin" >> /config/extensions_to_install.txt
          volumeMounts:
            - name: config-storage
              mountPath: /config
            - name: bin-storage
              mountPath: /usr/local/bin

      containers:
        - name: code-server
          image: lscr.io/linuxserver/code-server:latest
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/bash"
                  - "-c"
                  - |
                    if [ -f /config/extensions_to_install.txt ]; then
                      while read ext; do
                        /usr/bin/code-server --install-extension "$ext"
                      done < /config/extensions_to_install.txt
                      rm /config/extensions_to_install.txt
                    fi
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "UTC"
            - name: SUDO_PASSWORD
              value: "yourpassword" # Swap for a Secret in production
            - name: DEFAULT_WORKSPACE
              value: "/config/workspace/project"
          ports:
            - containerPort: 8443
              name: code-server
            - containerPort: 8080
              name: dev-web
          volumeMounts:
            - name: config-storage
              mountPath: /config
            - name: bin-storage
              mountPath: /usr/local/bin
  
  volumeClaimTemplates:
    - metadata:
        name: config-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: bin-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
