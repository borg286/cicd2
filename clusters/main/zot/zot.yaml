apiVersion: v1
kind: Namespace
metadata:
  name: zot-system
---
apiVersion: v1
kind: Service
metadata:
  name: zot-registry
  namespace: zot-system
spec:
  selector:
    app: zot
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: zot-system
data:
  # Change onDemand when we want to lock down external images to a vetted list
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": { "rootDirectory": "/var/lib/zot" },
      "http": { "address": "0.0.0.0", "port": "5000" },
      "log": { "level": "debug" },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "content": [{ "prefix": "**" }]
            }
          ]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: zot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
      - name: zot
        image: ghcr.io/project-zot/zot-linux-amd64:latest
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: config
          mountPath: /etc/zot
        - name: data
          mountPath: /var/lib/zot
      volumes:
      - name: config
        configMap:
          name: zot-config
      - name: data
        emptyDir: {}