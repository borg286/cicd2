name: Global Runtime Config
on:
  push:
    branches:
      - 'main'

jobs:
  update-redis:
    runs-on: bazel-heavy
    steps:
      - name: Manual Clone
        run: |
          git clone http://x-access-token:${{ secrets.GITHUB_TOKEN }}@forgejo-http.forgejo:3000/${{ github.repository }}.git .
      - name: Bazel Version
        run: |
          bazel version
