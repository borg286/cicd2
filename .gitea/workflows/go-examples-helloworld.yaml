# Trigger test
name: Go Project CI
on:
  push:
    paths:
      - 'go/examples/helloworld/**'
      - '.gitea/workflows/go-examples-helloworld.yaml'

jobs:
  bazel-build:
    runs-on: bazel-heavy
    steps:
      - name: Manual Clone or Update
        run: |
          REPO_DIR="/home/user/my-repo"
          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone http://x-access-token:${{ secrets.GITHUB_TOKEN }}@forgejo-http.forgejo:3000/${{ github.repository }}.git "$REPO_DIR"
          else
            cd "$REPO_DIR"
            git fetch
          fi
          cd "$REPO_DIR"
          git checkout ${{ github.sha }}
      - name: Check Bazel Server Status
        run: |
          echo "=== Checking Bazel processes ==="
          ps aux | grep -E "[b]azel|[a]ct_runner" || echo "No Bazel processes found"
          
          echo "=== Checking Bazel server socket ==="
          ls -la ~/.cache/bazel/_bazel_*/*/server/ 2>/dev/null || echo "No server sockets found"
          
          echo "=== Disk and memory ==="
          df -h
          free -h
      - name: Bazel Run Push
        run: |
          cd /home/user/my-repo
          bash -x go/examples/helloworld/build-test-push.sh
        env:
          ACTIONS_RUNNER_DEBUG: true


