apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-helloworld
spec:
  template:
    spec:
      containers:
        - name: helloworld
          # Format: [repository]@[digest]
          # .Values.oci_images.[target_name] is the standard path rules_helm uses
          image: {{ index .Values.oci_images "@@//go/examples/helloworld:push_oci" }}
          restartPolicy: OnFailure